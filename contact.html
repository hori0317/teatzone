<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>聯繫方式｜長照工具</title>
  <meta name="description" content="單位的各式聯繫方法。">
  <link rel="icon" type="image/x-icon" href="YORU.ico" />
  <link rel="stylesheet" href="style.css" />
  
  <script>
    /* 立即檢查主題設定，防止頁面閃爍 */
    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>

  <style>
    /* 彈窗樣式 - 已改為引用變數以支援深色模式 */
    .modal-overlay { 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background: rgba(47,47,32,0.6); 
        backdrop-filter: blur(3px); 
        z-index: 2000; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        padding: 20px; 
    }
    .modal-content { 
        background: var(--card); 
        border: 1px solid var(--line); 
        border-radius: 12px; 
        padding: 24px; 
        width: 100%; 
        max-width: 420px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
        text-align: center; 
        color: var(--ink);
    }
    .modal-content h3 { color: var(--green); margin-top: 0; }
    .modal-content input { 
        width: 100%; 
        padding: 10px; 
        border: 1px solid var(--line); 
        background: var(--input-bg); 
        color: var(--ink);
        border-radius: 8px; 
        font-size: 16px; 
        margin-top: 4px; 
        box-sizing: border-box; 
    }
    .modal-actions { margin-top: 20px; }

    /* 聯繫內容樣式修正 */
    .contact-info {
        margin-top: 20px; 
        font-size: 1.1rem; 
        line-height: 1.8;
        color: var(--ink);
    }

    /* 新增：加入我們表單樣式 */
    .join-form {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px dashed var(--line);
    }
    .join-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--green);
        margin-bottom: 10px;
    }
    .form-group {
        margin-bottom: 12px;
        text-align: left;
    }
    .form-label {
        display: block;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 4px;
    }
    .form-input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--line);
        background: var(--input-bg);
        color: var(--ink);
        border-radius: 8px;
        font-size: 16px;
        box-sizing: border-box;
    }
    /* 針對多行輸入框的特別樣式 */
    textarea.form-input {
        resize: vertical;
        min-height: 80px;
        font-family: inherit;
    }
    .form-input:focus {
        outline: 2px solid var(--green);
        border-color: transparent;
    }
  </style>
  <script src="nav.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body data-page="contact">

  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="logo-link"><img src="org-logo.png" alt="logo" onerror="this.style.opacity=0.2" /></a>
      <span class="site-title" id="siteTitle" data-sync-title>聯繫方式</span>
    </div>
    
    <nav class="nav-links" aria-label="主選單">
      <a href="calculator.html">額度計算機</a>
      <a href="payroll.html">薪資計算機</a>
      <a href="video.html">影音專區</a>
      <a href="care-info.html">長照資訊</a>
      <a href="news.html">最新公告</a>
      <a href="contact.html">聯繫方式</a>
      <a href="about.html">關於我們</a>
    </nav>
    
    <div class="actions" style="align-items: center; gap: 8px;">
        <!-- 深色模式切換按鈕 -->
        <button id="darkToggle" class="theme-btn">
            <span class="icon">🌙</span> <span class="txt">深色</span>
        </button>

        <button class="btn pill" style="background:#4285F4; color:white;" id="btnLogin" type="button">Google 登入</button>
        <div id="member-area" style="display:none; align-items: center; gap:5px;">
            <span id="userDisplay" style="font-size: 13px; font-weight: bold; color: var(--ink); margin-right: 4px;"></span>
            <a href="admin.html" id="btnAdminLink" class="btn pill" style="background:#673AB7; color:white; font-size:12px; padding:4px 10px; text-decoration:none; display:none;">管理後台</a>
            <button class="btn pill" style="background:#777; color:white; font-size:12px; padding:4px 10px;" id="btnEditProfile" type="button">修改資料</button>
            <button class="btn pill" style="background:#EA4335; color:white;" id="btnLogout" type="button">登出</button>
        </div>
    </div>
  </header>
  <div class="divider"></div>

  <main class="container">
    <section class="card">
      <h1 class="card-title">聯繫方式</h1>
      <p class="hint">單位的各式聯繫方法</p>
      
      <!-- 內容範例 -->
      <div class="contact-info">
          <p><b>電話：</b> 02-1234-5678</p>
          <p><b>地址：</b> 新北市</p>
          <p><b>Email：</b> shenghanfootorthoses@gmail.com</p>
      </div>

      <!-- 加入我們 / 留單區塊 -->
      <div class="join-form">
          <div class="join-title">👋 加入我們 / 留下聯絡資訊</div>
          <p class="hint" style="margin-bottom:15px;">若您想加入我們，或有其他合作需求，請留下資料，我們會盡快聯繫您。</p>
          
          <div class="form-group">
              <label class="form-label">您的稱呼 / 姓名 <span style="color:red">*</span></label>
              <input type="text" id="recruitName" class="form-input" placeholder="例如：王小明">
          </div>
          
          <div class="form-group">
              <label class="form-label">聯絡電話 <span style="color:red">*</span></label>
              <input type="tel" id="recruitPhone" class="form-input" placeholder="例如：0912-345-678">
          </div>

          <!-- 新增：其他回饋欄位 -->
          <div class="form-group">
              <label class="form-label">其他回饋 / 備註事項</label>
              <textarea id="recruitFeedback" class="form-input" rows="3" placeholder="如果您有任何建議或想說的話，歡迎在此留言..."></textarea>
          </div>

          <button id="btnSubmitRecruit" class="btn pill btn-green" style="width:100%; font-size:1.1rem; padding:10px;">送出資料</button>
      </div>

    </section>
  </main>

  <footer id="bottomDock" class="footerbar">
    <div class="foot"><span class="ok">© hori 長照工具平台</span></div>
  </footer>

  <div id="profile-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h3>歡迎加入！請完善資料</h3>
      <p>填寫您的基本資訊。</p>
      <div style="text-align:left; margin-bottom:12px;">
        <label style="font-weight:700; color:var(--ink); font-size:15px;">姓名 / 稱呼</label>
        <input type="text" id="pf-name" placeholder="例如：王小明">
      </div>
      <div style="text-align:left; margin-bottom:12px;">
        <label style="font-weight:700; color:var(--ink); font-size:15px;">使用者年齡</label>
        <input type="number" id="pf-age" placeholder="例如：65">
      </div>
      <div class="modal-actions">
        <button id="btn-save-profile" class="btn pill btn-green" style="width:100%; font-size:16px; padding:10px;">
          儲存並開始使用
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase 配置
    const config = {
      apiKey: "AIzaSyCZMhdUI0HeIoj5masuRh00pzP3SMbF6Yc",
      authDomain: "hori-test-1b93c.firebaseapp.com",
      projectId: "hori-test-1b93c",
      storageBucket: "hori-test-1b93c.firebasestorage.app",
      messagingSenderId: "549583061796",
      appId: "1:549583061796:web:ad58b8bf80c2b6b71c29b1"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const dom = {
        login: document.getElementById('btnLogin'),
        logout: document.getElementById('btnLogout'),
        member: document.getElementById('member-area'),
        user: document.getElementById('userDisplay'),
        admin: document.getElementById('btnAdminLink'),
        edit: document.getElementById('btnEditProfile'),
        modal: document.getElementById('profile-modal'),
        save: document.getElementById('btn-save-profile'),
        name: document.getElementById('pf-name'),
        age: document.getElementById('pf-age'),
        title: document.querySelector('#profile-modal h3'),
        darkToggle: document.getElementById('darkToggle'),
        // 留單相關 DOM
        recruitName: document.getElementById('recruitName'),
        recruitPhone: document.getElementById('recruitPhone'),
        recruitFeedback: document.getElementById('recruitFeedback'), // 新增回饋欄位
        btnRecruit: document.getElementById('btnSubmitRecruit')
    };

    // --- 深色模式切換邏輯 ---
    if (dom.darkToggle) {
        const icon = dom.darkToggle.querySelector('.icon');
        const txt = dom.darkToggle.querySelector('.txt');

        const updateBtnUI = (theme) => {
            if (theme === 'dark') {
                icon.textContent = '☀️';
                txt.textContent = '淺色';
            } else {
                icon.textContent = '🌙';
                txt.textContent = '深色';
            }
        };

        updateBtnUI(document.documentElement.getAttribute('data-theme'));

        dom.darkToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateBtnUI(newTheme);
        });
    }

    // --- 登入邏輯 ---
    if(dom.login) {
        dom.login.addEventListener('click', () => {
          signInWithPopup(auth, provider).catch(error => {
              if (error.code === 'auth/popup-blocked') {
                  alert("⚠️ 登入視窗被攔截！請使用 Safari/Chrome 等瀏覽器開啟。");
              } else {
                  alert("登入失敗：" + error.message);
              }
          });
        });
    }

    if(dom.logout) dom.logout.addEventListener('click', () => signOut(auth).then(() => { alert("已登出"); location.reload(); }));

    // --- 監聽登入狀態 ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        if(dom.login) dom.login.style.display = 'none';
        if(dom.member) dom.member.style.display = 'flex';
        if(dom.user) dom.user.textContent = user.displayName || user.email;

        try {
          const docSnap = await getDoc(doc(db, "users", user.uid));
          if (docSnap.exists()) {
             if(dom.user && docSnap.data().name) dom.user.textContent = docSnap.data().name;
          } else {
             if(dom.title) dom.title.textContent = "歡迎加入！請完善資料";
             if(dom.name) dom.name.value = user.displayName || "";
             if(dom.modal) dom.modal.style.display = 'flex';
          }
        } catch(e) {}

        try {
          const adminSnap = await getDoc(doc(db, "admins", user.email));
          if (adminSnap.exists() && dom.admin) dom.admin.style.display = 'inline-block';
        } catch(e) {}
      } else {
        if(dom.login) dom.login.style.display = 'block';
        if(dom.member) dom.member.style.display = 'none';
        if(dom.admin) dom.admin.style.display = 'none';
      }
    });

    // --- 修改個人資料 ---
    if(dom.edit) dom.edit.addEventListener('click', async () => {
      const s = await getDoc(doc(db, "users", auth.currentUser.uid));
      if(s.exists()){ const d = s.data(); dom.title.textContent = "修改個人資料"; dom.name.value = d.name || ""; dom.age.value = d.age || ""; dom.modal.style.display = 'flex'; }
    });

    // --- 儲存資料邏輯 ---
    if(dom.save) dom.save.addEventListener('click', async () => {
      const name = dom.name.value.trim();
      const age = dom.age.value.trim();
      if(!name || !age) return alert("請填寫完整");
      
      const userRef = doc(db, "users", auth.currentUser.uid);
      try {
          const docSnap = await getDoc(userRef);
          let data = { name, age, email: auth.currentUser.email, lastUpdated: serverTimestamp() };
          if (!docSnap.exists() || !docSnap.data().createdAt) {
              data.createdAt = serverTimestamp();
          }
          await setDoc(userRef, data, { merge: true });
          alert("儲存成功");
          dom.modal.style.display = 'none';
          dom.user.textContent = name;
      } catch (e) { alert("儲存失敗：" + e.message); }
    });

    if(dom.modal) dom.modal.addEventListener('click', (e) => {
      if (e.target === dom.modal && auth.currentUser && dom.user.textContent !== "" && dom.user.textContent !== auth.currentUser.email) {
          dom.modal.style.display = 'none';
      }
    });

    // --- 留單提交邏輯 (已包含權限檢查) ---
    if (dom.btnRecruit) {
        dom.btnRecruit.addEventListener('click', async () => {
            
            // 1. 檢查是否登入
            if (!auth.currentUser) {
                alert("🔒 請先登入會員後，才能送出資料喔！");
                if(dom.login && dom.login.style.display !== 'none') {
                    dom.login.click(); // 自動開啟登入
                }
                return;
            }

            const name = dom.recruitName.value.trim();
            const phone = dom.recruitPhone.value.trim();
            const feedback = dom.recruitFeedback.value.trim(); // 獲取回饋內容
            
            if (!name || !phone) {
                return alert("請至少填寫「姓名」與「聯絡電話」！");
            }

            dom.btnRecruit.textContent = "傳送中...";
            dom.btnRecruit.disabled = true;

            try {
                // 將資料寫入 'recruitment' 集合
                await addDoc(collection(db, "recruitment"), {
                    name: name,
                    phone: phone,
                    feedback: feedback, // 存入回饋
                    submittedBy: auth.currentUser.uid,
                    submittedEmail: auth.currentUser.email,
                    createdAt: serverTimestamp(),
                    status: 'new'
                });

                alert("資料已送出！我們會盡快與您聯繫。");
                dom.recruitName.value = "";
                dom.recruitPhone.value = "";
                dom.recruitFeedback.value = "";
            } catch (e) {
                console.error("送出失敗:", e);
                if (e.code === 'permission-denied') {
                    alert("送出失敗：權限不足。\n請確認您是否已登入，且網域已加入 Firebase 白名單。");
                } else {
                    alert("送出失敗：" + e.message);
                }
            } finally {
                dom.btnRecruit.textContent = "送出資料";
                dom.btnRecruit.disabled = false;
            }
        });
    }
  </script>
</body>
</html>
