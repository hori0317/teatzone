<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>聯繫方式｜長照工具</title>
  <meta name="description" content="單位的各式聯繫方法。">
  <link rel="icon" type="image/x-icon" href="YORU.ico" />
  <link rel="stylesheet" href="style.css" />
  
  <script>
    /* 立即檢查主題設定，防止頁面閃爍 */
    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>

  <style>
    /* 聯繫內容樣式修正 */
    .contact-info {
        margin-top: 20px; 
        font-size: 1.1rem; 
        line-height: 1.8;
        color: var(--ink);
    }

    /* 新增：加入我們表單樣式 */
    .join-form {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px dashed var(--line);
    }
    .join-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--green);
        margin-bottom: 10px;
    }
    .form-group {
        margin-bottom: 12px;
        text-align: left;
    }
    .form-label {
        display: block;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 4px;
    }
    .form-input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--line);
        background: var(--input-bg);
        color: var(--ink);
        border-radius: 8px;
        font-size: 16px;
        box-sizing: border-box;
    }
    /* 針對多行輸入框的特別樣式 */
    textarea.form-input {
        resize: vertical;
        min-height: 80px;
        font-family: inherit;
    }
    .form-input:focus {
        outline: 2px solid var(--green);
        border-color: transparent;
    }

    /* ============================================================
       工具列按鈕微調：
       將主選單完全交由 style.css 控制以保證全站 100% 一致。
       這裡僅縮小右側工具列按鈕與間距，避免壓到主選單。
       ============================================================ */
    .actions {
        display: flex;
        align-items: center;
        gap: 5px; 
        overflow-x: auto;       
        white-space: nowrap;    
        min-width: 0;
        scrollbar-width: thin;
    }

    /* 縮小按鈕本體 */
    .actions .btn, 
    .actions .theme-btn {
        padding: 4px 10px !important; 
        font-size: 13px !important;   
        flex-shrink: 0; 
        line-height: 1.2;
    }
    
    /* 縮小登入後會員區的間距 */
    #member-area { gap: 4px !important; }
    #userDisplay { font-size: 12px !important; margin-right: 2px !important; }

    /* 工具列捲軸樣式 */
    .actions::-webkit-scrollbar { height: 6px; }
    .actions::-webkit-scrollbar-track { background: transparent; }
    .actions::-webkit-scrollbar-thumb { background-color: var(--line); border-radius: 10px; }
    .actions::-webkit-scrollbar-thumb:hover { background-color: var(--ink); }

    @media (max-width: 1200px) {
        header.topbar { 
            flex-direction: column; 
            align-items: flex-start; 
            gap: 5px; 
            height: auto;
            padding: 8px 10px;
        }
        .brand { margin-bottom: 5px; margin-right: 0; }
        
        /* 選單獨立一行 */
        .nav-links { 
            width: 100%; 
            order: 2; 
            margin-bottom: 5px; 
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line); 
            overflow-x: auto;
            white-space: nowrap;
        }
        
        /* 工具列獨立一行 */
        .actions { 
            width: 100%; 
            order: 3; 
            justify-content: flex-start; 
        }
    }
  </style>
  <script src="nav.js" defer></script>
</head>
<body data-page="contact">
  <div class="watermark" aria-hidden="true">
    <span class="wm-item" style="top:5%; left:5%;  --dur:9s;">@hori版權所有</span>
    <span class="wm-item" style="top:50%; left:50%; --dur:10s;">@hori版權所有</span>
    <span class="wm-item" style="top:5%; left:65%; --dur:10s;">@hori版權所有</span>
    <span class="wm-item" style="top:25%; left:10%; --dur:13s;">@hori版權所有</span>
    <span class="wm-item" style="top:75%; left:70%; --dur:14s;">@hori版權所有</span>
  </div>
  
  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="logo-link"><img src="org-logo.png" alt="logo" onerror="this.style.opacity=0.2" /></a>
      <span class="site-title" id="siteTitle" data-sync-title>聯繫方式</span>
    </div>
    
    <nav class="nav-links" aria-label="主選單">
      <a href="calculator.html">額度計算機</a>
      <a href="payroll.html">薪資計算機</a>
      <a href="video.html">影音專區</a>
      <a href="care-info.html">長照資訊</a>
      <a href="news.html">最新公告</a>
      <a href="contact.html">聯繫方式</a>
      <a href="about.html">關於我們</a>
    </nav>
    
    <div class="actions">
        <button id="darkToggle" class="theme-btn">
            <span class="icon">🌙</span> <span class="txt">深色</span>
        </button>

        <button class="btn pill" style="background:#4285F4; color:white;" id="btnLogin" type="button">Google 登入</button>
        <div id="member-area" style="display:none; align-items: center; gap:5px;">
            <span id="userDisplay" style="font-size: 13px; font-weight: bold; color: var(--ink); margin-right: 4px;"></span>
            <a href="admin.html" id="btnAdminLink" class="btn pill" style="display:none;background:#673AB7;color:white;font-size:12px;padding:4px 10px;text-decoration:none">管理後台</a>
            <a href="profile.html" class="btn pill" style="background:#777; color:white; font-size:12px; padding:4px 10px; text-decoration:none;">會員資料</a>
            <button class="btn pill" style="background:#EA4335; color:white;" id="btnLogout" type="button">登出</button>
        </div>
    </div>
  </header>
  <div class="divider"></div>

  <main class="container">
    <section class="card">
      <h1 class="card-title">聯繫方式</h1>
      <p class="hint">單位的各式聯繫方法</p>
      
      <div class="contact-info">
          <p><b>電話：</b> 02-1234-5678</p>
          <p><b>地址：</b> 新北市</p>
          <p><b>Email：</b> shenghanfootorthoses@gmail.com</p>
      </div>

      <div class="join-form">
          <div class="join-title">👋 加入我們 / 留下聯絡資訊</div>
          <p class="hint" style="margin-bottom:15px;">若您想加入我們，或有其他合作需求，請留下資料，我們會盡快聯繫您。</p>
          
          <div class="form-group">
              <label class="form-label">您的稱呼 / 姓名 <span style="color:red">*</span></label>
              <input type="text" id="recruitName" class="form-input" placeholder="例如：王小明">
          </div>
          
          <div class="form-group">
              <label class="form-label">聯絡電話 <span style="color:red">*</span></label>
              <input type="tel" id="recruitPhone" class="form-input" placeholder="例如：0912-345-678">
          </div>

          <div class="form-group">
              <label class="form-label">其他回饋 / 備註事項</label>
              <textarea id="recruitFeedback" class="form-input" rows="3" placeholder="如果您有任何建議或想說的話，歡迎在此留言..."></textarea>
          </div>

          <button id="btnSubmitRecruit" class="btn pill btn-green" style="width:100%; font-size:1.1rem; padding:10px;">送出資料</button>
      </div>
    </section>
  </main>

  <footer id="bottomDock" class="footerbar">
    <div class="foot"><span class="ok">© hori 長照工具平台</span></div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase 配置
    const config = {
      apiKey: "AIzaSyCZMhdUI0HeIoj5masuRh00pzP3SMbF6Yc",
      authDomain: "hori-test-1b93c.firebaseapp.com",
      projectId: "hori-test-1b93c",
      storageBucket: "hori-test-1b93c.firebasestorage.app",
      messagingSenderId: "549583061796",
      appId: "1:549583061796:web:ad58b8bf80c2b6b71c29b1"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const dom = {
        login: document.getElementById('btnLogin'),
        logout: document.getElementById('btnLogout'),
        member: document.getElementById('member-area'),
        user: document.getElementById('userDisplay'),
        admin: document.getElementById('btnAdminLink'),
        darkToggle: document.getElementById('darkToggle'),
        // 留單相關 DOM
        recruitName: document.getElementById('recruitName'),
        recruitPhone: document.getElementById('recruitPhone'),
        recruitFeedback: document.getElementById('recruitFeedback'),
        btnRecruit: document.getElementById('btnSubmitRecruit')
    };

    // --- 深色模式切換邏輯 ---
    if (dom.darkToggle) {
        const icon = dom.darkToggle.querySelector('.icon');
        const txt = dom.darkToggle.querySelector('.txt');

        const updateBtnUI = (theme) => {
            if (theme === 'dark') {
                icon.textContent = '☀️';
                txt.textContent = '淺色';
            } else {
                icon.textContent = '🌙';
                txt.textContent = '深色';
            }
        };

        updateBtnUI(document.documentElement.getAttribute('data-theme'));

        dom.darkToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateBtnUI(newTheme);
        });
    }

    // --- 登入邏輯 ---
    if(dom.login) {
        dom.login.addEventListener('click', () => {
          signInWithPopup(auth, provider).catch(error => {
              if (error.code === 'auth/popup-blocked') {
                  alert("⚠️ 登入視窗被攔截！請使用 Safari/Chrome 等瀏覽器開啟。");
              } else {
                  alert("登入失敗：" + error.message);
              }
          });
        });
    }

    if(dom.logout) dom.logout.addEventListener('click', () => signOut(auth).then(() => { alert("已登出"); location.reload(); }));

    // --- 監聽登入狀態 & 強制導向邏輯 ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        if(dom.login) dom.login.style.display = 'none';
        if(dom.member) dom.member.style.display = 'flex';
        if(dom.user) dom.user.textContent = user.displayName || user.email;

        try {
          const docSnap = await getDoc(doc(db, "users", user.uid));
          const isComplete = docSnap.exists() && docSnap.data().name && docSnap.data().idNumber && docSnap.data().phone;
          
          if (!isComplete) {
             alert("⚠️ 系統偵測到您尚未完成會員資料！\n請先完成基本資料填寫，以解鎖完整功能。");
             window.location.href = "profile.html"; // 強制跳轉至會員資料頁
             return; 
          } else {
             if(dom.user) dom.user.textContent = docSnap.data().name;
          }
        } catch(e) { console.error("讀取會員資料失敗", e); }

        try {
          const adminSnap = await getDoc(doc(db, "admins", user.email));
          if (adminSnap.exists() && dom.admin) dom.admin.style.display = 'inline-block';
        } catch(e) {}
      } else {
        if(dom.login) dom.login.style.display = 'block';
        if(dom.member) dom.member.style.display = 'none';
        if(dom.admin) dom.admin.style.display = 'none';
      }
    });

    // --- 留單提交邏輯 ---
    if (dom.btnRecruit) {
        dom.btnRecruit.addEventListener('click', async () => {
            
            // 1. 檢查是否登入
            if (!auth.currentUser) {
                alert("🔒 請先登入會員後，才能送出資料喔！");
                if(dom.login && dom.login.style.display !== 'none') {
                    dom.login.click(); // 自動開啟登入
                }
                return;
            }

            const name = dom.recruitName.value.trim();
            const phone = dom.recruitPhone.value.trim();
            const feedback = dom.recruitFeedback.value.trim(); 
            
            if (!name || !phone) {
                return alert("請至少填寫「姓名」與「聯絡電話」！");
            }

            dom.btnRecruit.textContent = "傳送中...";
            dom.btnRecruit.disabled = true;

            try {
                // 將資料寫入 'recruitment' 集合
                await addDoc(collection(db, "recruitment"), {
                    name: name,
                    phone: phone,
                    feedback: feedback, 
                    submittedBy: auth.currentUser.uid,
                    submittedEmail: auth.currentUser.email,
                    createdAt: serverTimestamp(),
                    status: 'new'
                });

                alert("資料已送出！我們會盡快與您聯繫。");
                dom.recruitName.value = "";
                dom.recruitPhone.value = "";
                dom.recruitFeedback.value = "";
            } catch (e) {
                console.error("送出失敗:", e);
                if (e.code === 'permission-denied') {
                    alert("送出失敗：權限不足。\n請確認您是否已登入，且網域已加入 Firebase 白名單。");
                } else {
                    alert("送出失敗：" + e.message);
                }
            } finally {
                dom.btnRecruit.textContent = "送出資料";
                dom.btnRecruit.disabled = false;
            }
        });
    }
  </script>
</body>
</html>
