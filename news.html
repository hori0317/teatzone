<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>最新公告｜長照工具</title>
  <meta name="description" content="單位公告與更新資訊。">
  <link rel="icon" type="image/x-icon" href="YORU.ico" />
  <link rel="stylesheet" href="style.css" />
  
  <script>
    /* 立即檢查主題設定，防止頁面閃爍 */
    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>

  <style>
    /* 公告列表樣式修正 */
    .news-list {
        padding-left: 20px; 
        margin-top: 15px; 
        line-height: 2;
        color: var(--ink);
    }
    .news-list li {
        margin-bottom: 10px;
    }

    /* 管理員新增/編輯公告表單樣式 */
    .admin-news-form {
        display: none; /* 預設隱藏，驗證為管理員後才顯示 */
        margin-bottom: 20px;
        padding: 16px;
        border: 2px dashed var(--green);
        border-radius: 12px;
        background: var(--table-stripe);
    }
    .admin-news-form h3 { margin-top: 0; color: var(--green); margin-bottom: 12px; font-size: 16px; }
    .form-row-inline { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-row-inline input {
        padding: 8px 12px;
        border: 1px solid var(--line);
        background: var(--input-bg);
        color: var(--ink);
        border-radius: 8px;
        font-size: 15px;
    }

    /* 工具列按鈕微調 */
    .actions {
        display: flex;
        align-items: center;
        gap: 5px; 
        overflow-x: auto;       
        white-space: nowrap;    
        min-width: 0;
        scrollbar-width: thin;
    }
    .actions .btn, 
    .actions .theme-btn {
        padding: 4px 10px !important; 
        font-size: 13px !important;   
        flex-shrink: 0; 
        line-height: 1.2;
    }
    #member-area { gap: 4px !important; }
    #userDisplay { font-size: 12px !important; margin-right: 2px !important; }

    .actions::-webkit-scrollbar { height: 6px; }
    .actions::-webkit-scrollbar-track { background: transparent; }
    .actions::-webkit-scrollbar-thumb { background-color: var(--line); border-radius: 10px; }
    .actions::-webkit-scrollbar-thumb:hover { background-color: var(--ink); }

    @media (max-width: 1200px) {
        header.topbar { 
            flex-direction: column; 
            align-items: flex-start; 
            gap: 5px; 
            height: auto;
            padding: 8px 10px;
        }
        .brand { margin-bottom: 5px; margin-right: 0; }
        .nav-links { 
            width: 100%; 
            order: 2; 
            margin-bottom: 5px; 
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line); 
            overflow-x: auto;
            white-space: nowrap;
        }
        .actions { 
            width: 100%; 
            order: 3; 
            justify-content: flex-start; 
        }
    }
  </style>

  <script src="nav.js" defer></script>
</head>
<body data-page="news">
  <div class="watermark" aria-hidden="true">
    <span class="wm-item" style="top:5%; left:5%;  --dur:9s;">@hori版權所有</span>
    <span class="wm-item" style="top:50%; left:50%; --dur:10s;">@hori版權所有</span>
    <span class="wm-item" style="top:5%; left:65%; --dur:10s;">@hori版權所有</span>
    <span class="wm-item" style="top:25%; left:10%; --dur:13s;">@hori版權所有</span>
    <span class="wm-item" style="top:75%; left:70%; --dur:14s;">@hori版權所有</span>
  </div>
  
  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="logo-link"><img src="org-logo.png" alt="logo" onerror="this.style.opacity=0.2" /></a>
      <span class="site-title" id="siteTitle" data-sync-title>最新公告</span>
    </div>
    
    <nav class="nav-links" aria-label="主選單">
      <a href="calculator.html">額度計算機</a>
      <a href="payroll.html">薪資計算機</a>
      <a href="video.html">影音專區</a>
      <a href="care-info.html">長照資訊</a>
      <a href="news.html">最新公告</a>
      <a href="contact.html">聯繫方式</a>
      <a href="about.html">關於我們</a>
    </nav>
    
    <div class="actions">
        <button id="darkToggle" class="theme-btn">
            <span class="icon">🌙</span> <span class="txt">深色</span>
        </button>

        <button class="btn pill" style="background:#4285F4; color:white;" id="btnLogin" type="button">Google 登入</button>
        <div id="member-area" style="display:none; align-items: center; gap:5px;">
            <span id="userDisplay" style="font-size: 13px; font-weight: bold; color: var(--ink); margin-right: 4px;"></span>
            <a href="admin.html" id="btnAdminLink" class="btn pill" style="display:none;background:#673AB7;color:white;font-size:12px;padding:4px 10px;text-decoration:none">管理後台</a>
            <a href="profile.html" class="btn pill" style="background:#777; color:white; font-size:12px; padding:4px 10px; text-decoration:none;">會員資料</a>
            <button class="btn pill" style="background:#EA4335; color:white;" id="btnLogout" type="button">登出</button>
        </div>
    </div>
  </header>
  <div class="divider"></div>

  <main class="container">
    <section class="card">
      <h1 class="card-title">最新公告</h1>
      <p class="hint">系統最新更新與公告事項。</p>

      <div id="adminNewsForm" class="admin-news-form">
          <h3 id="formModeTitle">➕ 新增公告 (管理員可見)</h3>
          <div class="form-row-inline">
              <input type="date" id="newsDate">
              <input type="text" id="newsContent" placeholder="輸入公告內容..." style="flex: 1; min-width: 200px;">
              <button id="btnSubmitNews" class="btn pill btn-green">發佈公告</button>
              <button id="btnCancelEdit" class="btn pill btn-gray" style="display:none;">取消編輯</button>
          </div>
      </div>
      
      <ul class="news-list" id="newsList">
        <li>載入中...</li>
      </ul>
    </section>
  </main>

  <footer id="bottomDock" class="footerbar">
    <div class="foot"><span class="ok">© hori 長照工具平台</span></div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // ★ 注意：這裡引入了 updateDoc 來執行編輯功能
    import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, orderBy, serverTimestamp, deleteDoc, updateDoc } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase 配置
    const config = {
      apiKey: "AIzaSyCZMhdUI0HeIoj5masuRh00pzP3SMbF6Yc",
      authDomain: "hori-test-1b93c.firebaseapp.com",
      projectId: "hori-test-1b93c",
      storageBucket: "hori-test-1b93c.firebasestorage.app",
      messagingSenderId: "549583061796",
      appId: "1:549583061796:web:ad58b8bf80c2b6b71c29b1"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const dom = {
        login: document.getElementById('btnLogin'),
        logout: document.getElementById('btnLogout'),
        member: document.getElementById('member-area'),
        user: document.getElementById('userDisplay'),
        admin: document.getElementById('btnAdminLink'),
        darkToggle: document.getElementById('darkToggle'),
        
        // 公告相關 DOM
        adminNewsForm: document.getElementById('adminNewsForm'),
        formModeTitle: document.getElementById('formModeTitle'),
        newsDate: document.getElementById('newsDate'),
        newsContent: document.getElementById('newsContent'),
        btnSubmitNews: document.getElementById('btnSubmitNews'),
        btnCancelEdit: document.getElementById('btnCancelEdit'),
        newsList: document.getElementById('newsList')
    };

    let isAdmin = false; 
    let isSuperAdmin = false; 
    
    let loadedNews = []; // 用來暫存當前抓下來的公告資料
    let editingNewsId = null; // 紀錄目前正在編輯哪一筆公告，null 代表新增模式

    // 防止 XSS 攻擊
    function escapeHtml(text) {
        if (!text) return text;
        return text.toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // --- 載入公告列表邏輯 ---
    async function loadNews() {
        try {
            // 依日期排序
            const q = query(collection(db, "news"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            
            dom.newsList.innerHTML = ''; 
            loadedNews = []; // 清空暫存
            
            if (querySnapshot.empty) {
                dom.newsList.innerHTML = '<li>目前沒有最新公告。</li>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                loadedNews.push({ id: docSnap.id, ...data }); // 將資料存入陣列供編輯時使用
                
                const li = document.createElement('li');
                let html = `<strong>${escapeHtml(data.date)}：</strong> ${escapeHtml(data.content)}`;
                
                // 超級管理員專屬：編輯與刪除按鈕
                if (isSuperAdmin) {
                    html += ` <button class="btn pill btn-orange" style="font-size:11px; padding:2px 8px; margin-left:10px;" onclick="editNews('${docSnap.id}')">編輯</button>`;
                    html += ` <button class="btn pill btn-gray" style="font-size:11px; padding:2px 8px; margin-left:5px;" onclick="deleteNews('${docSnap.id}')">刪除</button>`;
                }
                
                li.innerHTML = html;
                dom.newsList.appendChild(li);
            });
        } catch (e) {
            console.error("載入公告失敗", e);
            dom.newsList.innerHTML = '<li style="color:red;">載入公告失敗，請檢查網路連線。</li>';
        }
    }

    // --- 刪除與編輯函數 (暴露給全域以供按鈕呼叫) ---
    window.deleteNews = async (id) => {
        if (!confirm("確定要刪除這則公告嗎？")) return;
        try {
            await deleteDoc(doc(db, "news", id));
            loadNews(); 
        } catch(e) {
            alert("刪除失敗 (您可能沒有超級管理員權限)：" + e.message);
        }
    };

    window.editNews = (id) => {
        const target = loadedNews.find(n => n.id === id);
        if (!target) return;

        // 進入編輯模式：切換狀態與外觀
        editingNewsId = id;
        dom.newsDate.value = target.date;
        dom.newsContent.value = target.content;
        
        dom.formModeTitle.textContent = "✏️ 編輯公告";
        dom.btnSubmitNews.textContent = "儲存修改";
        dom.btnSubmitNews.classList.replace('btn-green', 'btn-orange');
        dom.btnCancelEdit.style.display = 'inline-block';
        
        // 畫面捲動到表單
        dom.adminNewsForm.scrollIntoView({ behavior: 'smooth' });
    };

    // --- 取消編輯、還原表單 ---
    function resetForm() {
        editingNewsId = null;
        dom.newsDate.value = new Date().toISOString().split('T')[0]; // 回復為今天
        dom.newsContent.value = "";
        
        dom.formModeTitle.textContent = "➕ 新增公告 (管理員可見)";
        dom.btnSubmitNews.textContent = "發佈公告";
        dom.btnSubmitNews.classList.replace('btn-orange', 'btn-green');
        dom.btnCancelEdit.style.display = 'none';
    }

    if (dom.btnCancelEdit) dom.btnCancelEdit.addEventListener('click', resetForm);

    // --- 發佈 / 更新公告邏輯 ---
    if (dom.btnSubmitNews) {
        resetForm(); // 初始化日期

        dom.btnSubmitNews.addEventListener('click', async () => {
            const dateVal = dom.newsDate.value;
            const contentVal = dom.newsContent.value.trim();
            
            if (!dateVal || !contentVal) {
                return alert("請填寫日期與公告內容！");
            }

            dom.btnSubmitNews.disabled = true;
            dom.btnSubmitNews.textContent = editingNewsId ? "更新中..." : "發佈中...";

            try {
                if (editingNewsId) {
                    // ★ 編輯模式：更新現有文件
                    await updateDoc(doc(db, "news", editingNewsId), {
                        date: dateVal,
                        content: contentVal
                    });
                    alert("公告更新成功！");
                } else {
                    // ★ 新增模式：建立新文件
                    await addDoc(collection(db, "news"), {
                        date: dateVal,
                        content: contentVal,
                        createdAt: serverTimestamp(),
                        author: auth.currentUser.email
                    });
                    alert("公告發佈成功！");
                }
                
                resetForm(); // 成功後清空表單、回歸新增模式
                loadNews();  // 重新載入列表
            } catch(e) {
                alert((editingNewsId ? "更新" : "發佈") + "失敗：" + e.message);
            } finally {
                dom.btnSubmitNews.disabled = false;
                if (!editingNewsId) dom.btnSubmitNews.textContent = "發佈公告";
            }
        });
    }

    loadNews();

    // --- 深色模式切換邏輯 ---
    if (dom.darkToggle) {
        const icon = dom.darkToggle.querySelector('.icon');
        const txt = dom.darkToggle.querySelector('.txt');
        const updateBtnUI = (theme) => {
            if (theme === 'dark') { icon.textContent = '☀️'; txt.textContent = '淺色'; } 
            else { icon.textContent = '🌙'; txt.textContent = '深色'; }
        };
        updateBtnUI(document.documentElement.getAttribute('data-theme'));
        dom.darkToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateBtnUI(newTheme);
        });
    }

    // --- 登入與會員邏輯 ---
    if(dom.login) {
        dom.login.addEventListener('click', () => {
          signInWithPopup(auth, provider).catch(error => alert("登入失敗：" + error.message));
        });
    }
    if(dom.logout) dom.logout.addEventListener('click', () => signOut(auth).then(() => location.reload()));

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        if(dom.login) dom.login.style.display = 'none';
        if(dom.member) dom.member.style.display = 'flex';
        if(dom.user) dom.user.textContent = user.displayName || user.email;

        try {
          const docSnap = await getDoc(doc(db, "users", user.uid));
          const isComplete = docSnap.exists() && docSnap.data().name && docSnap.data().idNumber && docSnap.data().phone;
          if (!isComplete) {
             alert("⚠️ 系統偵測到您尚未完成會員資料！\n請先完成基本資料填寫，以解鎖完整功能。");
             window.location.href = "profile.html"; 
             return; 
          } else {
             if(dom.user) dom.user.textContent = docSnap.data().name;
          }
        } catch(e) { console.error("讀取會員資料失敗", e); }

        try {
          const adminSnap = await getDoc(doc(db, "admins", user.email));
          if (adminSnap.exists()) {
             isAdmin = true; 
             if (user.email === 'shenghanfootorthoses@gmail.com') {
                 isSuperAdmin = true;
             }
             if (dom.admin) dom.admin.style.display = 'inline-block';
             if (dom.adminNewsForm) dom.adminNewsForm.style.display = 'block'; 
             loadNews(); 
          }
        } catch(e) {}
      } else {
        isAdmin = false;
        isSuperAdmin = false;
        if(dom.login) dom.login.style.display = 'block';
        if(dom.member) dom.member.style.display = 'none';
        if(dom.admin) dom.admin.style.display = 'none';
        if(dom.adminNewsForm) dom.adminNewsForm.style.display = 'none';
      }
    });
  </script>
</body>
</html>
