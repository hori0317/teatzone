<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>首頁｜長照工具平台</title>
  <meta name="description" content="長照服務工具平台，提供額度試算、薪資計算。">
  <link rel="icon" type="image/x-icon" href="YORU.ico" />
  <link rel="stylesheet" href="style.css" />
  
  <script>
    /* 立即檢查主題設定，防止頁面閃爍 */
    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>

  <style>
    /* ============================================================
       工具列按鈕微調：
       將主選單完全交由 style.css 控制以保證全站 100% 一致。
       這裡僅縮小右側工具列按鈕與間距，避免壓到主選單。
       ============================================================ */
    .actions {
        display: flex;
        align-items: center;
        gap: 5px; 
        overflow-x: auto;       
        white-space: nowrap;    
        min-width: 0;
        scrollbar-width: thin;
    }

    /* 縮小按鈕本體 */
    .actions .btn, 
    .actions .theme-btn {
        padding: 4px 10px !important; 
        font-size: 13px !important;   
        flex-shrink: 0; 
        line-height: 1.2;
    }
    
    /* 縮小登入後會員區的間距 */
    #member-area { gap: 4px !important; }
    #userDisplay { font-size: 12px !important; margin-right: 2px !important; }

    /* 工具列捲軸樣式 */
    .actions::-webkit-scrollbar { height: 6px; }
    .actions::-webkit-scrollbar-track { background: transparent; }
    .actions::-webkit-scrollbar-thumb { background-color: var(--line); border-radius: 10px; }
    .actions::-webkit-scrollbar-thumb:hover { background-color: var(--ink); }

    @media (max-width: 1200px) {
        header.topbar { 
            flex-direction: column; 
            align-items: flex-start; 
            gap: 5px; 
            height: auto;
            padding: 8px 10px;
        }
        .brand { margin-bottom: 5px; margin-right: 0; }
        
        /* 選單獨立一行 */
        .nav-links { 
            width: 100%; 
            order: 2; 
            margin-bottom: 5px; 
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line); 
            overflow-x: auto;
            white-space: nowrap;
        }
        
        /* 工具列獨立一行 */
        .actions { 
            width: 100%; 
            order: 3; 
            justify-content: flex-start; 
        }
    }
  </style>
  <script src="nav.js" defer></script>
</head>
<body data-page="home">

  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="logo-link"><img src="org-logo.png" alt="logo" onerror="this.style.opacity=0.2" /></a>
      <span class="site-title" data-sync-title>長照工具平台</span>
    </div>
    
    <nav class="nav-links" aria-label="主選單">
      <a href="calculator.html">額度計算機</a>
      <a href="payroll.html">薪資計算機</a>
      <a href="video.html">影音專區</a>
      <a href="care-info.html">長照資訊</a>
      <a href="news.html">最新公告</a>
      <a href="contact.html">聯繫方式</a>
      <a href="about.html">關於我們</a>
    </nav>
    
    <div class="actions">
        <button id="darkToggle" class="theme-btn">
            <span class="icon">🌙</span> <span class="txt">深色</span>
        </button>

        <button class="btn pill" style="background:#4285F4; color:white;" id="btnLogin" type="button">Google 登入</button>
        <div id="member-area" style="display:none; align-items: center; gap:5px;">
            <span id="userDisplay" style="font-size: 13px; font-weight: bold; color: var(--ink); margin-right: 4px;"></span>
            <a href="admin.html" id="btnAdminLink" class="btn pill" style="display:none;background:#673AB7;color:white;font-size:12px;padding:4px 10px;text-decoration:none">管理後台</a>
            <a href="profile.html" class="btn pill" style="background:#777; color:white; font-size:12px; padding:4px 10px; text-decoration:none;">會員資料</a>
            <button class="btn pill" style="background:#EA4335; color:white;" id="btnLogout" type="button">登出</button>
        </div>
    </div>
  </header>

  <section class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title">測試頁面</h1>
      <p class="hero-desc">
        測試中。<br>
        致力於提供簡單易懂的長照資訊，<br>
        部分功能仍在測試中
      </p>
      <a href="calculator.html" class="btn pill btn-green" style="padding:12px 30px; font-size:1.1rem; text-decoration:none; box-shadow: 0 4px 15px rgba(46,125,50,0.4);">立即試算額度</a>
    </div>
  </section>

  <section class="features-section">
    <div class="features-grid">
      <a href="calculator.html" class="feature-card">
        <div class="feature-icon">🧮</div>
        <h3 class="feature-title">額度計算機</h3>
        <p class="feature-text">輸入 CMS 等級，一鍵試算政府補助額度與自付金額，精準規劃每月預算。</p>
      </a>
      <a href="payroll.html" class="feature-card">
        <div class="feature-icon">💰</div>
        <h3 class="feature-title">薪資計算機</h3>
        <p class="feature-text">專為機構與居服員設計，支援拆帳比例設定與勞健保扣款試算。</p>
      </a>
      <a href="video.html" class="feature-card">
        <div class="feature-icon">🎥</div>
        <h3 class="feature-title">影音專區</h3>
        <p class="feature-text">會員限定！觀看專業長照教學影片，自動記錄學習時數與進度。</p>
      </a>
      <a href="care-info.html" class="feature-card">
        <div class="feature-icon">ℹ️</div>
        <h3 class="feature-title">長照資訊</h3>
        <p class="feature-text">查詢最新長照法規、BA 碼別定義與補助細則，資訊透明公開。</p>
      </a>
    </div>
  </section>

  <footer id="bottomDock" class="footerbar" style="text-align:center;">
    <div class="foot"><span class="ok">© hori 長照工具平台</span></div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase 配置
    const config = {
      apiKey: "AIzaSyCZMhdUI0HeIoj5masuRh00pzP3SMbF6Yc",
      authDomain: "hori-test-1b93c.firebaseapp.com",
      projectId: "hori-test-1b93c",
      storageBucket: "hori-test-1b93c.firebasestorage.app",
      messagingSenderId: "549583061796",
      appId: "1:549583061796:web:ad58b8bf80c2b6b71c29b1"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const dom = {
        login: document.getElementById('btnLogin'),
        logout: document.getElementById('btnLogout'),
        member: document.getElementById('member-area'),
        user: document.getElementById('userDisplay'),
        admin: document.getElementById('btnAdminLink'),
        darkToggle: document.getElementById('darkToggle')
    };

    // --- 深色模式切換邏輯 ---
    if (dom.darkToggle) {
        const icon = dom.darkToggle.querySelector('.icon');
        const txt = dom.darkToggle.querySelector('.txt');

        const updateBtnUI = (theme) => {
            if (theme === 'dark') {
                icon.textContent = '☀️';
                txt.textContent = '淺色';
            } else {
                icon.textContent = '🌙';
                txt.textContent = '深色';
            }
        };

        // 初始化按鈕
        updateBtnUI(document.documentElement.getAttribute('data-theme'));

        dom.darkToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateBtnUI(newTheme);
        });
    }

    // --- 登入邏輯 ---
    if(dom.login) {
        dom.login.addEventListener('click', () => {
          signInWithPopup(auth, provider).catch(error => {
              if (error.code === 'auth/popup-blocked') {
                  alert("⚠️ 登入視窗被攔截！\n請使用 Safari/Chrome 等瀏覽器開啟。\n不要使用 LINE 或 FB 內建瀏覽器。");
              } else {
                  alert("登入失敗：" + error.message);
              }
          });
        });
    }

    // --- 登出邏輯 ---
    if(dom.logout) {
        dom.logout.addEventListener('click', () => signOut(auth).then(() => { alert("已登出"); location.reload(); }));
    }

    // --- 監聽登入狀態 & 強制導向邏輯 ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        if(dom.login) dom.login.style.display = 'none';
        if(dom.member) dom.member.style.display = 'flex';
        if(dom.user) dom.user.textContent = user.displayName || user.email;

        // ★ 核心檢查邏輯：驗證是否為新會員或資料未齊全
        try {
          const docSnap = await getDoc(doc(db, "users", user.uid));
          const isComplete = docSnap.exists() && docSnap.data().name && docSnap.data().idNumber && docSnap.data().phone;
          
          if (!isComplete) {
             alert("⚠️ 系統偵測到您尚未完成會員資料！\n請先完成基本資料填寫，以解鎖完整功能。");
             window.location.href = "profile.html"; // 強制跳轉至會員資料頁
             return; // 停止執行後續代碼
          } else {
             // 資料完整，正常顯示姓名
             if(dom.user) dom.user.textContent = docSnap.data().name;
          }
        } catch(e) { console.error("讀取會員資料失敗", e); }

        // 檢查管理員權限
        try {
          const adminSnap = await getDoc(doc(db, "admins", user.email));
          if (adminSnap.exists() && dom.admin) dom.admin.style.display = 'inline-block';
        } catch(e) {}
      } else {
        if(dom.login) dom.login.style.display = 'block';
        if(dom.member) dom.member.style.display = 'none';
        if(dom.admin) dom.admin.style.display = 'none';
      }
    });
  </script>
</body>
</html>
