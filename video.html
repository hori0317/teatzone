<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>影音學習區｜長照工具</title>
  <link rel="icon" type="image/x-icon" href="YORU.ico" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 將原本硬編碼的顏色改為引用 style.css 的變數 */
    .video-card { text-align: center; margin-bottom: 20px; max-width: 100%; margin: 0 auto; }
    
    .video-container { 
        position: relative; 
        width: 100%; 
        padding-bottom: 56.25%; 
        height: 0; 
        overflow: hidden; 
        border-radius: 12px; 
        background: #000; 
        margin: 0 auto; 
    }
    
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    
    .video-mask-top { position: absolute; top: 0; left: 0; width: 100%; height: 80px; background: transparent; z-index: 10; cursor: default; }
    
    .video-mask-logo { position: absolute; bottom: 0; right: 0; width: 120px; height: 50px; background: transparent; z-index: 10; cursor: default; }
    
    .login-warning-box { 
        padding: 40px 20px; 
        background: var(--card); /* 改用變數 */
        border: 2px dashed var(--line); /* 改用變數 */
        border-radius: 12px; 
        color: var(--muted); /* 改用變數 */
        font-weight: 700; 
    }

    /* ============================================================
       工具列按鈕微調：
       將主選單完全交由 style.css 控制以保證全站 100% 一致。
       這裡僅縮小右側工具列按鈕與間距，避免壓到主選單。
       ============================================================ */
    .actions {
        display: flex;
        align-items: center;
        gap: 5px; 
        overflow-x: auto;       
        white-space: nowrap;    
        min-width: 0;
        scrollbar-width: thin;
    }

    /* 縮小按鈕本體 */
    .actions .btn, 
    .actions .theme-btn {
        padding: 4px 10px !important; 
        font-size: 13px !important;   
        flex-shrink: 0; 
        line-height: 1.2;
    }
    
    /* 縮小登入後會員區的間距 */
    #member-area { gap: 4px !important; }
    #userDisplay { font-size: 12px !important; margin-right: 2px !important; }

    /* 工具列捲軸樣式 */
    .actions::-webkit-scrollbar { height: 6px; }
    .actions::-webkit-scrollbar-track { background: transparent; }
    .actions::-webkit-scrollbar-thumb { background-color: var(--line); border-radius: 10px; }
    .actions::-webkit-scrollbar-thumb:hover { background-color: var(--ink); }

    @media (max-width: 1200px) {
        header.topbar { 
            flex-direction: column; 
            align-items: flex-start; 
            gap: 5px; 
            height: auto;
            padding: 8px 10px;
        }
        .brand { margin-bottom: 5px; margin-right: 0; }
        
        /* 選單獨立一行 */
        .nav-links { 
            width: 100%; 
            order: 2; 
            margin-bottom: 5px; 
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line); 
            overflow-x: auto;
            white-space: nowrap;
        }
        
        /* 工具列獨立一行 */
        .actions { 
            width: 100%; 
            order: 3; 
            justify-content: flex-start; 
        }
    }
  </style>
  
  <script>
    /* 立即檢查主題設定，防止頁面閃爍 */
    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  
  <script src="nav.js" defer></script>
</head>
<body data-page="video">

  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="logo-link"><img src="org-logo.png" alt="logo" onerror="this.style.opacity=0.2" /></a>
      <span class="site-title" data-sync-title>影音學習區</span>
    </div>
    
    <nav class="nav-links">
      <a href="calculator.html">額度計算機</a>
      <a href="payroll.html">薪資計算機</a>
      <a href="video.html">影音專區</a>
      <a href="care-info.html">長照資訊</a>
      <a href="news.html">最新公告</a>
      <a href="contact.html">聯繫方式</a>
      <a href="about.html">關於我們</a>
    </nav>
    
    <div class="actions">
        <button id="darkToggle" class="theme-btn">
            <span class="icon">🌙</span> <span class="txt">深色</span>
        </button>

        <button class="btn pill" style="background:#4285F4; color:white;" id="btnLogin">Google 登入</button>
        <div id="member-area" style="display:none; align-items: center; gap:5px;">
            <span id="userDisplay" style="font-size: 13px; font-weight: bold; color: var(--ink);"></span>
            <a href="admin.html" id="btnAdminLink" class="btn pill" style="background:#673AB7; color:white; font-size:12px; display:none; text-decoration:none;">管理後台</a>
            <a href="profile.html" class="btn pill" style="background:#777; color:white; font-size:12px; text-decoration:none;">會員資料</a>
            <button class="btn pill" style="background:#EA4335; color:white;" id="btnLogout">登出</button>
        </div>
    </div>
  </header>
  <div class="divider"></div>

  <main class="container">
    <section class="card video-card">
        <h2 class="card-title">🎥 學習影片：長照服務介紹</h2>
        <div id="login-warning" class="login-warning-box">🔒 請先登入會員以累積學習時數</div>
    
        <div id="video-wrapper" style="display:none;">
            <div class="video-container">
                <div id="video-placeholder"></div>
                <div class="video-mask-top"></div>
                <div class="video-mask-logo"></div>
            </div>
            <p class="hint" style="margin-top:12px; font-size:15px;">
                您的總學習時數：<span id="watchTimeDisplay" style="color:var(--green); font-weight:bold; font-size:18px;">0</span> 秒
                <span id="saveStatus" style="font-size:13px; color:var(--muted); margin-left:8px;"></span>
            </p>
        </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { apiKey: "AIzaSyCZMhdUI0HeIoj5masuRh00pzP3SMbF6Yc", authDomain: "hori-test-1b93c.firebaseapp.com", projectId: "hori-test-1b93c", storageBucket: "hori-test-1b93c.firebasestorage.app", messagingSenderId: "549583061796", appId: "1:549583061796:web:ad58b8bf80c2b6b71c29b1" };
    const app=initializeApp(config), auth=getAuth(app), db=getFirestore(app), provider=new GoogleAuthProvider();

    const dom={ login:document.getElementById('btnLogin'), logout:document.getElementById('btnLogout'), member:document.getElementById('member-area'), user:document.getElementById('userDisplay'), admin:document.getElementById('btnAdminLink'), video:document.getElementById('video-wrapper'), warn:document.getElementById('login-warning'), status:document.getElementById('saveStatus'), watch:document.getElementById('watchTimeDisplay') };

    // 深色模式切換邏輯
    const toggleBtn = document.getElementById('darkToggle');
    const toggleIcon = toggleBtn.querySelector('.icon');
    const toggleTxt = toggleBtn.querySelector('.txt');

    function updateBtnUI(theme) {
        if (theme === 'dark') {
            toggleIcon.textContent = '☀️';
            toggleTxt.textContent = '淺色';
        } else {
            toggleIcon.textContent = '🌙';
            toggleTxt.textContent = '深色';
        }
    }

    // 初始化按鈕狀態
    updateBtnUI(document.documentElement.getAttribute('data-theme'));

    toggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateBtnUI(newTheme);
    });

    const YOUTUBE_VIDEO_ID = 'PLG2Uexyi9s'; 
    let currentUser=null, player, timer, currentSec=0, baseTotalSec=0;

    // YouTube API 完整載入
    const tag = document.createElement('script'); 
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('video-placeholder', {
        videoId: YOUTUBE_VIDEO_ID, playerVars: { 'playsinline':1, 'modestbranding':1, 'rel':0, 'controls':1, 'fs':0, 'iv_load_policy':3 },
        events: { 'onStateChange': onPlayerStateChange }
      });
    };

    function onPlayerStateChange(e){ if(e.data==1) startT(); else stopT(); }
    
    function startT(){ 
        if(!currentUser)return; 
        if(timer) clearInterval(timer); 
        timer=setInterval(()=>{ 
            currentSec++; 
            // 顯示 = 資料庫原本的總量 + 本次開啟頁面後看的量
            if(dom.watch) dom.watch.textContent = baseTotalSec + currentSec; 
            if(currentSec >= 10) save(); 
        }, 1000); 
    }
    
    function stopT(){ if(timer){ clearInterval(timer); timer=null; } save(); }

    async function save(){ 
        if(!currentUser || currentSec === 0) return;
        const addedSec = currentSec; 
        currentSec = 0; // 立即歸零避免重複計算
        
        if(dom.status) dom.status.textContent="同步中...";
        try{ 
            // 1. 更新使用者總時數 (這是後台讀取的來源)
            const userRef = doc(db, "users", currentUser.uid);
            await updateDoc(userRef, {
                totalWatchTime: increment(addedSec),
                lastActive: serverTimestamp()
            });

            // 2. 同步更新本地基準值，確保 UI 顯示連續
            baseTotalSec += addedSec;

            // 3. 另外存一份詳細日誌
            setDoc(doc(db,"video_logs",currentUser.uid+"_"+YOUTUBE_VIDEO_ID), { 
                lastWatched:serverTimestamp(), 
                totalSeconds: baseTotalSec 
            }, {merge:true}); 

            if(dom.status){ dom.status.textContent="已同步"; setTimeout(()=>dom.status.textContent="",2000); }
        }catch(e){ console.error(e); } 
    }

    // 初始化時從 users 讀取總時數
    async function loadHist(u){ 
        try{ 
            const s = await getDoc(doc(db, "users", u.uid)); 
            if(s.exists()){
                baseTotalSec = s.data().totalWatchTime || 0;
            } else {
                baseTotalSec = 0;
            }
            if(dom.watch) dom.watch.textContent = baseTotalSec; 
        }catch(e){ console.error(e); } 
    }

    dom.login.addEventListener('click',()=>signInWithPopup(auth,provider));
    dom.logout.addEventListener('click',()=>signOut(auth).then(()=>location.reload()));

    onAuthStateChanged(auth, async u=>{
      if(u){
        currentUser=u; dom.login.style.display='none'; dom.warn.style.display='none'; dom.video.style.display='block'; dom.member.style.display='flex'; dom.user.textContent=u.displayName||u.email; 
        await loadHist(u); // 先讀取歷史時數
        try{ 
            const s=await getDoc(doc(db,"users",u.uid)); 
            if(s.exists() && s.data().name) {
                dom.user.textContent=s.data().name;
            }
            const a=await getDoc(doc(db,"admins",u.email)); if(a.exists()) dom.admin.style.display='inline-block';
        }catch(e){}
      }else{ dom.login.style.display='block'; dom.member.style.display='none'; dom.warn.style.display='block'; dom.video.style.display='none'; }
    });
  </script>
</body>
</html>
